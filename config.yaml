# Configuration for EV Battery Thermal Digital Twin PINN Pipeline

paths:
  dataset_dir: "SimuLink/PINN_Dataset"
  scalers_dir: "datasets/scalers"
  summary_stats: "results/summary_statistics.csv"
  results_baseline_dir: "results/baseline"
  results_pinn_dir: "results/pinn"

training:
  random_seed: 42
  device: "cuda" # Default device (will fall back to cpu if not available)
  noise_std: 0.05 # Standard deviation of Gaussian noise added to Temperature_C
  gradient_clip: 1.0 # Gradient clipping threshold
  early_stopping_patience: 10 # Patience for early stopping

baseline_mlp:
  input_dim: 7 # ["Temperature_C", "Current_A", "Voltage_V", "SOC_pct", "PowerLoss_W", "AmbientTemp_C", "MassScale"]
  hidden_dim: 64
  epochs: 100
  batch_size: 8192
  learning_rate: 0.001

pinn:
  input_dim: 7 # Same features
  hidden_dim: 64
  epochs: 100
  batch_size: 8192
  learning_rate: 0.001
  lambda_physics: 0.01

physics:
  mCp: 900.0 # Base thermal capacity (J/K)
  initial_hA: 0.1 # Initial convection coefficient (W/K)
